services:
  - type: web
    name: sistema-de-ventas-backend
    rootDir: backend
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start --port 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: postgresql://postgres.hdnvtecbwvvqhsrmudgi:nYZLwQY6JO3PcQ1U@aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=disable
      - key: JWT_ACCESS_SECRET
        value: access_secret_ventas_2026
      - key: JWT_REFRESH_SECRET
        value: refresh_secret_ventas_2026
      - key: SMTP_ENABLED
        value: "false"
      - key: REDIS_URL
        value: rediss://default:gQAAAAAAAaRdAAIgcDFhOWRjOTZmOTI5MDE0OWIyYWUzMTc3YTZmODUyMTlmZg@national-quagga-107613.upstash.io:6379
    healthCheck:
      path: /api/health/ready
      interval: 30
      timeout: 10
      unhealthyThreshold: 3