services:
  - type: web
    name: backend
    rootDir: backend
    region: oregon
    buildCommand: bash render-build.sh
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.19.0"
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        value: postgres://postgres:[TUPASSWORD]@db.cnqqenulxvkvbvuyhidp.supabase.co:5432/postgres
      - key: JWT_ACCESS_SECRET
        generateValue: 32
      - key: JWT_REFRESH_SECRET
        generateValue: 32
      - key: NEXTAUTH_SECRET
        generateValue: 32
      - key: NEXTAUTH_URL
        value: https://tu-frontend.onrender.com
      - key: SMTP_ENABLED
        value: "false"
      - key: REDIS_URL
        value: redis://default:uVfb123@redis.render.cloud:6379
    healthCheck:
      path: /api/health/ready
      interval: 30
      timeout: 10
      unhealthyThreshold: 3