services:
  - type: web
    name: backend
    rootDir: backend
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: ventas-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: ventas-redis
          property: url
    healthCheck:
      path: /api/health/ready
      interval: 30
      timeout: 10
      unhealthyThreshold: 3