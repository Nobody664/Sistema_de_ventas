services:
  - type: web
    name: backend
    rootDir: backend
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.19.0"
      - key: PORT
        value: "4000"
      - key: JWT_ACCESS_SECRET
        generateValue: 32
      - key: JWT_REFRESH_SECRET
        generateValue: 32
      - key: NEXTAUTH_SECRET
        generateValue: 32
      - key: NEXTAUTH_URL
        value: https://tu-frontend.onrender.com
      - key: SMTP_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: ventas-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: ventas-redis
          property: url
    healthCheck:
      path: /api/health/ready
      interval: 30
      timeout: 10
      unhealthyThreshold: 3